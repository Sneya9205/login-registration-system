<!DOCTYPE html>
<html>
    <head>
        <title>Register</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
        <link rel="stylesheet" href=".\css\form.css">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="js/register.js"></script>
    </head>
    <body class="body">
        <h2>Register</h2><br>
        <form class="d-flex flex-column gap-0.25">
            <label>Name:</label>
            <input type="text" id="uname" placeholder="enter name" required autocomplete="username"><br>
            <label>Email:</label>
            <input type="email" id="umail" placeholder="enter mail id" required autocomplete="email"><br>
            <label>Password:</label>
            <input type="password" id="pwd" placeholder="enter password" required autocomplete="new-password"><br>
            <button class="submit" id="submit">Register</button>
        </form>
    </body>
</html>
