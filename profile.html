<!DOCTYPE html>
<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="js/profile.js"></script>
        <link rel="stylesheet" href=".\css\form.css">
    </head>
    <body class="body">
        <h2>Profile</h2><br>
        <form id="profileForm" class="d-flex flex-column gap-0">
            <label>Full Name:</label>
            <input type="text" id="fname" name="fullname" placeholder="enter name" required autocomplete="username"><br>
            <label>Age:</label>
            <input type="number" id="age" name="age" placeholder="enter age" required autocomplete="email"><br>
            <label>Phone number:</label>
            <input type="text" id="ph" name="phone" placeholder="enter number" required autocomplete="cc-number"><br>
            <label>Address:</label>
            <input type="text" id="address" name="address" placeholder="enter address" required autocomplete="address"><br>
            <button type="submit" class="submit"  id="submit">Save Profile</button>
        </form>
        <br>
        <div id="message"></div>
    </body>
</html>
