<!DOCTYPE html>
<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href=".\css\form.css">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="js/login.js"></script>
    </head>
    <body class="body">
        <h2>LOGIN</h2>
        <form class="d-flex flex-column gap-1">
            
            <label>Email:</label>
            <input type="email" id="email" placeholder="enter mail id" required autocomplete="email"><br>
            <label>Password:</label>
            <input type="password" id="pwd" placeholder="enter password" required autocomplete="current-password"><br>
            <button class="submit" id="submit">Login</button>
        </form>
    </body>
</html>
